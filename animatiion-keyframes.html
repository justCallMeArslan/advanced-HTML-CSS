<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="animation-keyframes.css">
    <title>Keyframes</title>
</head>

<body>
    Animations was made to loop , while transitions are not.
    Animations emnabled by itslef, while transitions require trigger such as
    pseudoclasses like :hov or :focus.
    Animations are more flexible, while transition are more straight forwarded.


    <!-- example -->

    <div class="container">
        <div id="ball"></div>
    </div>
    <!-- example 2 -->
    <div class="container1">
        <div id="ball1"></div>
    </div>


    <!-- assignment part  -->
    <div class="box"></div>
    <div class="box1">I'm fading away!!!</div>
    <div class="bounce">
        <div class="box2 one"></div>
        <div class="box2 two "></div>
        <div class="box2 three"></div>
    </div>

    <style>
        @keyframes breath {
            0% {
                transform: scale(1) rotateZ(0deg);
            }

            50% {
                background-color: blue;
            }

            100% {
                transform: scale(2) rotateZ(360deg);
                background-color: green;
            }
        }

        @keyframes fade {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(2);
            }

            100% {
                opacity: 0;
                transform: scale(2);
            }
        }

        .box {
            /* animation: breath 2500ms;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate; */

            animation: breath 2500ms ease-in-out infinite alternate;
            /*  shorthand attributes can be used in any order, and because of that 
            its better to keep them apart from shorthand as it will may cause troubles 
            if mixed with duration */
            animation-delay: 1000ms;
        }


        .box1 {
            animation: fade 2500ms;
            /* animation-fill-mode lets us persist the final value from the animation */
            animation-fill-mode: forwards;

            /* animation-fill-mode: backwards does the same thing as forwards , 
            but vice-versa, it hides unwanted elements andd later shows them as intended */
        }
    </style>

    <!-- dynamic animations -->

    <style>
        @keyframes bounce {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(var(--bounce-offset));
                background-color: black
            }
        }

        .box2 {
            animation: bounce alternate infinite cubic-bezier(0.2, .65, .6, 1);
            /* cubic-bezier is the custom animation-timing-function */
        }

        .box2.one {
            --bounce-offset: -30px;
            animation-duration: 300ms;
        }

        .box2.two {
            --bounce-offset: -20px;
            animation-duration: 200ms;
        }

        .box2.three {
            --bounce-offset: -40px;
            animation-duration: 400ms;
        }
    </style>

</body>

</html>
